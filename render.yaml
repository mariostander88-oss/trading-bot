services:
  - type: web
    name: trading-bot-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: TRADING_MODE
        value: paper
      - key: LIVE_TRADING_CONFIRMED
        value: "false"
      - key: WATCHLIST
        value: SPY,QQQ
      - key: TIMEFRAME_MINUTES
        value: "15"
      - key: HISTORICAL_BARS_LIMIT
        value: "120"
      - key: DATA_FEED
        value: iex
      - key: MAX_RISK_PER_TRADE
        value: "0.01"
      - key: MAX_DAILY_LOSS
        value: "0.03"
      - key: MAX_OPEN_POSITIONS
        value: "3"
      - key: STOP_LOSS_PCT
        value: "0.02"
      - key: DATABASE_URL
        sync: false
      - key: API_ADMIN_TOKEN
        sync: false
      - key: PYTHONPATH
        value: .

  - type: web
    name: trading-bot-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m streamlit run app/dashboard.py --server.address=0.0.0.0 --server.port=$PORT
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: TRADING_MODE
        value: paper
      - key: LIVE_TRADING_CONFIRMED
        value: "false"
      - key: WATCHLIST
        value: SPY,QQQ
      - key: TIMEFRAME_MINUTES
        value: "15"
      - key: HISTORICAL_BARS_LIMIT
        value: "120"
      - key: DATA_FEED
        value: iex
      - key: MAX_RISK_PER_TRADE
        value: "0.01"
      - key: MAX_DAILY_LOSS
        value: "0.03"
      - key: MAX_OPEN_POSITIONS
        value: "3"
      - key: STOP_LOSS_PCT
        value: "0.02"
      - key: DATABASE_URL
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: PYTHONPATH
        value: .
