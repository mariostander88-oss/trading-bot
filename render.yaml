services:
  - type: web
    name: trading-bot-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: TRADING_MODE
        value: paper
      - key: LIVE_TRADING_CONFIRMED
        value: "false"
      - key: WATCHLIST
        value: SPY,QQQ,NVDA,AMD,AVGO,TSM,ASML,MSFT,GOOGL,AMZN,META,ORCL,PLTR,SMCI,ARM,TSLA
      - key: TIMEFRAME_MINUTES
        value: "15"
      - key: HISTORICAL_BARS_LIMIT
        value: "120"
      - key: DATA_FEED
        value: iex
      - key: MAX_RISK_PER_TRADE
        value: "0.05"
      - key: MAX_DAILY_LOSS
        value: "0.20"
      - key: DAILY_PROFIT_TARGET
        value: "0"
      - key: DAILY_GOAL_BLOCKS_NEW_BUYS
        value: "false"
      - key: MAX_OPEN_POSITIONS
        value: "8"
      - key: STOP_LOSS_PCT
        value: "0.03"
      - key: DATABASE_URL
        sync: false
      - key: API_ADMIN_TOKEN
        sync: false
      - key: PYTHONPATH
        value: .
      - key: NOTIFICATIONS_ENABLED
        value: "false"
      - key: NOTIFICATION_CHANNELS
        value: email
      - key: NOTIFICATION_TIMES
        value: 09:00,18:00
      - key: NOTIFICATION_TIMEZONE
        value: Africa/Nairobi
      - key: REPORT_SUBJECT_PREFIX
        value: Trading Bot
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_TO
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USE_SSL
        value: "false"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_WHATSAPP_TO
        sync: false
      - key: CONGRESS_LOOKBACK_DAYS
        value: "30"

  - type: web
    name: trading-bot-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m streamlit run app/dashboard.py --server.address=0.0.0.0 --server.port=$PORT
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets
      - key: TRADING_MODE
        value: paper
      - key: LIVE_TRADING_CONFIRMED
        value: "false"
      - key: WATCHLIST
        value: SPY,QQQ,NVDA,AMD,AVGO,TSM,ASML,MSFT,GOOGL,AMZN,META,ORCL,PLTR,SMCI,ARM,TSLA
      - key: TIMEFRAME_MINUTES
        value: "15"
      - key: HISTORICAL_BARS_LIMIT
        value: "120"
      - key: DATA_FEED
        value: iex
      - key: MAX_RISK_PER_TRADE
        value: "0.05"
      - key: MAX_DAILY_LOSS
        value: "0.20"
      - key: DAILY_PROFIT_TARGET
        value: "0"
      - key: DAILY_GOAL_BLOCKS_NEW_BUYS
        value: "false"
      - key: MAX_OPEN_POSITIONS
        value: "8"
      - key: STOP_LOSS_PCT
        value: "0.03"
      - key: DATABASE_URL
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: PYTHONPATH
        value: .
      - key: NOTIFICATIONS_ENABLED
        value: "false"
      - key: NOTIFICATION_CHANNELS
        value: email
      - key: NOTIFICATION_TIMES
        value: 09:00,18:00
      - key: NOTIFICATION_TIMEZONE
        value: Africa/Nairobi
      - key: REPORT_SUBJECT_PREFIX
        value: Trading Bot
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_TO
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USE_SSL
        value: "false"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_WHATSAPP_TO
        sync: false
      - key: CONGRESS_LOOKBACK_DAYS
        value: "30"
